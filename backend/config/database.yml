default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: db
  username: postgres
  password: password

development:
  <<: *default
  database: app_development

test:
  <<: *default
  database: myapp_test

production:
  <<: *default
  host:
  database:
  username: <%= ENV["USER_NAME"] %>
  password: <%= ENV["MYAPP_DATABASE_PASSWORD"] %>

