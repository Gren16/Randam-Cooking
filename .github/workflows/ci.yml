name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run ESLint
      working-directory: ./frontend
      run: npm run lint

    - name: Run Prettier check
      working-directory: ./frontend
      run: npm run format:check

    # - name: Run tests
    #  working-directory: ./frontend
    #  run: npm run test

    - name: Build Next.js app
      working-directory: ./frontend
      run: npm run build

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create test environment file
      working-directory: ./backend
      run: |
        cat << EOF > .env.test
        RAILS_ENV=development
        DATABASE_URL=postgresql://postgres:password@db:5432/app_development
        POSTGRES_DB=app_development
        POSTGRES_USER=postgres
        POSTGRES_PASSWORD=password
        EOF

    - name: Build and run tests with Docker Compose
      working-directory: ./backend
      run: |
        docker compose -f docker-compose.test.yml up --build -d

        docker compose -f docker-compose.test.yml exec -T web bash -c "
          until pg_isready -h db -p 5432 -U postgres; do
            echo 'Waiting for PostgreSQL...'
            sleep 2
          done
        "

        docker compose -f docker-compose.test.yml exec -T web rails db:create RAILS_ENV=test
        docker compose -f docker-compose.test.yml exec -T web rails db:schema:load RAILS_ENV=test

        docker compose -f docker-compose.test.yml exec -T web bundle exec rspec

        docker compose -f docker-compose.test.yml exec -T web bundle exec rubocop

    - name: Clean up
      if: always()
      working-directory: ./backend
      run: |
        docker compose -f docker-compose.test.yml down -v

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
        working-directory: ./backend

    - name: Setup database
      working-directory: ./backend
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load

    - name: Run RSpec tests
      working-directory: ./backend
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      run: bundle exec rspec
